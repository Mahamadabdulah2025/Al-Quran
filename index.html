<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Al-Qurʾān — Recitation & Tajwīd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cinzel:wght@600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   VARIABLES
══════════════════════════════════════ */
:root{
  --th:58px; --sw:254px;
  --ar:22px;
  --g1:#0d5c3a;--g2:#1a7a4e;--g3:#e8f5ee;--g4:#c3dfcc;
  --gold:#c8973a;--gold2:#f0c060;
  --bg:#f4f1eb;--surf:#fff;--surf2:#f0ede7;
  --sb:#0b2016;--sb2:#112a1c;--sb3:#1a3828;
  --sbt:#b8d8c4;--sbm:#3f6050;
  --tx:#1a2e22;--tx2:#3a5a45;--mu:#6b8f75;--lt:#a0bfaa;
  --bd:#dae8df;--bd2:#b8d4c0;
  --red:#c0392b;--redl:#fdf0ef;
  --amb:#d68910;--ambl:#fef9e7;
  --blu:#2471a3;--blul:#eaf4fc;
  --pur:#7d3c98;--purl:#f5eef8;
  --sh:0 2px 12px rgba(13,92,58,.10);
  --sh2:0 6px 32px rgba(13,92,58,.15);
}
[data-theme="dark"]{
  --bg:#0d1a12;--surf:#121e17;--surf2:#182a1e;
  --sb:#070f0b;--sb2:#0c1812;--sb3:#112118;
  --sbt:#90c0a0;--sbm:#305040;
  --tx:#cce0d4;--tx2:#90c0a0;--mu:#587060;--lt:#2a4035;
  --bd:#1a3025;--bd2:#1e3828;
  --g1:#18a060;--g2:#20c070;--g3:#0d2018;--g4:#142a1e;
  --gold:#e0a840;--gold2:#f8c860;
  --red:#e04838;--redl:#1e0c0a;
  --amb:#e8a018;--ambl:#181208;
  --blu:#4098cc;--blul:#081828;
  --pur:#b050d8;--purl:#180828;
}

/* ══════════════════════════════════════
   RESET — NATURAL PAGE SCROLL
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
/* ✅ Body scrolls the page naturally */
body{
  font-family:'Nunito',sans-serif;color:var(--tx);
  background:var(--bg);
  overflow-x:hidden;
  /* overflow-y is AUTO — the default — never hidden */
}
::selection{background:var(--g3);color:var(--tx)}
:focus-visible{outline:2px solid var(--g1);outline-offset:2px;border-radius:4px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
*{scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}

/* ══════════════════════════════════════
   TOPBAR — sticky, always visible
══════════════════════════════════════ */
#topbar{
  position:sticky;top:0;z-index:1000;
  height:var(--th);
  background:var(--sb);border-bottom:1px solid var(--sb3);
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
#menuBtn{
  display:none;background:none;border:none;
  color:var(--sbt);font-size:22px;cursor:pointer;
  padding:6px;border-radius:6px;line-height:1;flex-shrink:0;
}
#menuBtn:hover{background:var(--sb3)}
.logo{font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);letter-spacing:.5px;white-space:nowrap;line-height:1.2}
.logo small{display:block;font-family:'Nunito',sans-serif;font-size:9px;color:var(--sbt);opacity:.55;font-weight:400;letter-spacing:0}
#curInfo{font-size:11px;color:var(--sbt);opacity:.65;padding:0 10px;border-left:1px solid var(--sb3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
#topCtrls{margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0}
.tsep{width:1px;height:22px;background:var(--sb3);margin:0 2px;flex-shrink:0}
.tg{background:var(--sb2);border:1px solid var(--sb3);color:var(--sbt);padding:5px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tg:hover{border-color:var(--gold);color:var(--gold2)}
.tg.on{background:var(--gold);color:#071008;border-color:var(--gold)}
/* Font slider */
#fSlider{-webkit-appearance:none;appearance:none;width:70px;height:4px;background:var(--sb3);border-radius:2px;cursor:pointer}
#fSlider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer}
#fSlider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--gold);border:none;cursor:pointer}
#langSel{background:var(--sb2);border:1px solid var(--sb3);color:var(--sbt);padding:5px 7px;border-radius:6px;font-size:11px;cursor:pointer;max-width:115px;font-family:'Nunito',sans-serif}
#langSel:focus{outline:none;border-color:var(--gold)}

/* ══════════════════════════════════════
   SIDEBAR — fixed position
   Stays visible while page scrolls
══════════════════════════════════════ */
#sidebar{
  position:fixed;
  top:var(--th);left:0;
  width:var(--sw);
  height:calc(100vh - var(--th));
  background:var(--sb);
  border-right:1px solid var(--sb3);
  display:flex;flex-direction:column;
  z-index:900;
  /* Internal scroll for the surah list */
  overflow:hidden;
}
#sHead{padding:10px;border-bottom:1px solid var(--sb3);flex-shrink:0;display:flex;align-items:center;gap:6px}
#closeBtn{display:none;background:none;border:none;color:var(--sbt);font-size:18px;cursor:pointer;padding:4px;border-radius:4px;flex-shrink:0}
#closeBtn:hover{background:var(--sb3)}
#sSearch{flex:1;background:var(--sb2);border:1px solid var(--sb3);color:var(--sbt);padding:7px 10px;border-radius:7px;font-size:12px;min-width:0;font-family:'Nunito',sans-serif}
#sSearch::placeholder{color:var(--sbm)}
#sSearch:focus{outline:none;border-color:var(--gold)}
#sList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.si{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.si:hover{background:var(--sb2)}
.si.active{background:rgba(200,151,58,.12);border-left-color:var(--gold)}
.sn{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.06);color:var(--sbt);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si.active .sn{background:var(--gold);color:#071008}
.si-info{flex:1;min-width:0}
.si-e{font-size:12px;font-weight:500;color:var(--sbt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si.active .si-e{color:var(--gold2)}
.si-m{font-size:10px;color:var(--sbm);margin-top:1px}
.si-a{font-size:14px;font-family:'Amiri',serif;color:var(--sbm);flex-shrink:0}
.si.active .si-a{color:var(--gold);opacity:.8}

/* ══════════════════════════════════════
   MAIN — offset for sidebar
   ✅ NO height/overflow restrictions
══════════════════════════════════════ */
#main{
  margin-left:var(--sw);
  /* NO height. NO overflow. Page scrolls body naturally. */
}

/* ══════════════════════════════════════
   WELCOME
══════════════════════════════════════ */
#welcome{
  min-height:calc(100vh - var(--th));
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:40px 24px;text-align:center;
}
.w-ico{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--sh2);flex-shrink:0}
.w-title{font-family:'Cinzel',serif;font-size:22px;color:var(--g1);letter-spacing:1px}
.w-sub{font-size:13px;color:var(--mu);max-width:320px;line-height:1.7}
.w-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px}
.w-card{padding:13px;background:var(--surf);border:1px solid var(--bd);border-radius:12px;text-align:left}
.w-card .wi{font-size:20px;margin-bottom:4px}
.w-card .wt{font-size:12px;font-weight:700;color:var(--g1)}
.w-card .wd{font-size:11px;color:var(--mu);margin-top:2px;line-height:1.4}
.w-cta{padding:12px 26px;background:var(--g1);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.w-cta:hover{background:var(--g2)}

/* ══════════════════════════════════════
   SURAH VIEW — shown after picking surah
══════════════════════════════════════ */
#sview{display:none}

/* Sticky surah header (sticks below topbar) */
#shdr{
  position:sticky;top:var(--th);z-index:800;
  background:var(--surf);border-bottom:1px solid var(--bd);
  padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.sh-name{font-size:17px;font-weight:700;color:var(--g1)}
.sh-meta{font-size:11px;color:var(--mu);margin-top:2px}
.sh-ar{font-size:26px;font-family:'Amiri',serif;color:var(--lt);line-height:1}

/* Sticky tabs (sticks below surah header) */
#tabs{
  position:sticky;top:calc(var(--th) + 56px);z-index:700;
  background:var(--surf);border-bottom:1px solid var(--bd);
  display:flex;padding:0 16px;overflow-x:auto;scrollbar-width:none;
}
#tabs::-webkit-scrollbar{display:none}
.tb{padding:10px 13px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--mu);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:'Nunito',sans-serif}
.tb:hover{color:var(--g1)}
.tb.on{color:var(--g1);border-bottom-color:var(--g1);font-weight:700}

/* ✅ Content — pure natural flow */
#content{
  padding:24px 28px 100px;
  max-width:860px;
  margin:0 auto;
}

/* ══════════════════════════════════════
   BISMILLAH
══════════════════════════════════════ */
.bismillah{
  font-family:'Amiri Quran','Amiri',serif;
  font-size:calc(var(--ar) + 4px);
  direction:rtl;text-align:center;color:var(--tx2);
  padding:18px 24px;
  background:linear-gradient(135deg,var(--g3),var(--surf));
  border:1px solid var(--bd2);border-radius:16px;
  margin-bottom:20px;line-height:2.2;
  user-select:text;-webkit-user-select:text;
  transition:font-size .2s;
}
[data-theme="dark"] .bismillah{background:linear-gradient(135deg,var(--g3),var(--surf2))}

/* ══════════════════════════════════════
   SINGLE-AYAH HERO CARD
   Modern Quran app — one ayah per card
══════════════════════════════════════ */
.ah{
  background:var(--surf);border:1px solid var(--bd);
  border-radius:16px;margin-bottom:20px;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
  scroll-margin-top:calc(var(--th) + 100px);
}
.ah:hover{border-color:var(--bd2)}
.ah.cur{border-color:var(--g1);box-shadow:var(--sh2)}

/* Top row */
.ah-top{display:flex;align-items:center;gap:10px;padding:14px 20px 0}
.ah-badge{
  width:34px;height:34px;border-radius:50%;
  background:var(--g3);color:var(--g1);
  font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
[data-theme="dark"] .ah-badge{color:var(--g2)}
.ah-label{font-size:11px;color:var(--mu)}
.ah-btns{margin-left:auto;display:flex;gap:5px}
.ah-btn{
  background:none;border:1px solid var(--bd);color:var(--mu);
  padding:5px 9px;border-radius:6px;font-size:11px;cursor:pointer;
  transition:all .15s;font-family:'Nunito',sans-serif;
}
.ah-btn:hover{border-color:var(--g1);color:var(--g1);background:var(--g3)}

/* Arabic text */
.ah-ar{
  font-family:'Amiri Quran','Amiri',serif;
  font-size:var(--ar);
  direction:rtl;text-align:right;
  line-height:2.6;color:var(--tx);
  padding:14px 24px 10px;
  user-select:text;-webkit-user-select:text;
  word-break:break-word;
  transition:font-size .2s;
}
/* Word spans */
.aw{display:inline;border-radius:4px;padding:0 1px;cursor:default;transition:background .2s}
.aw.lit{background:rgba(200,151,58,.35)}
[data-theme="dark"] .aw.lit{background:rgba(200,151,58,.22)}
.ah-marker{font-size:14px;color:var(--lt);margin-right:4px}

/* Translation */
.ah-tr{
  font-size:13px;color:var(--tx2);line-height:1.85;
  padding:0 24px 18px;
  border-top:1px solid var(--g3);
  margin-top:4px;
  user-select:text;-webkit-user-select:text;
}
[data-theme="dark"] .ah-tr{border-top-color:var(--bd)}
.ah-tr-rtl{direction:rtl;text-align:right}

/* Romanization / Transliteration */
.ah-rom{
  font-size:12px;color:var(--mu);font-style:italic;letter-spacing:.3px;
  line-height:1.85;padding:0 24px 12px;
  border-top:1px dashed var(--bd);padding-top:8px;margin-top:2px;
  user-select:text;-webkit-user-select:text;
}
[data-theme="dark"] .ah-rom{color:var(--lt)}
.pc-rom{font-size:12px;color:rgba(255,255,255,.5);font-style:italic;
  letter-spacing:.3px;margin-top:6px;line-height:1.7}
.or-rom{font-size:12px;color:var(--mu);font-style:italic;letter-spacing:.3px;
  line-height:1.85;margin-top:6px;padding-top:6px;border-top:1px dashed var(--bd)}

/* Word-by-word Comparison */
.wcomp{margin-bottom:18px}
.wgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.witem{
  background:var(--surf);border:1px solid var(--bd);
  border-radius:10px;padding:10px 12px;text-align:center;
  min-width:86px;max-width:140px;flex:1;transition:transform .15s;
}
.witem.ok{background:var(--g3);border-color:var(--g1)}
.witem.err{background:var(--redl);border-color:var(--red)}
.witem.miss{background:var(--ambl);border-color:var(--amb)}
.witem.extra{background:var(--blul);border-color:var(--blu)}
.wi-ar{font-family:'Amiri',serif;font-size:19px;direction:rtl;color:var(--tx);margin-bottom:4px;line-height:1.6}
.witem.ok .wi-ar{color:var(--g1)}
.witem.err .wi-ar{color:var(--red)}
.witem.miss .wi-ar{color:var(--amb)}
.wi-badge{font-size:14px;display:block;margin-bottom:4px}
.wi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.witem.ok .wi-label{color:var(--g1)}
.witem.err .wi-label{color:var(--red)}
.witem.miss .wi-label{color:var(--amb)}
.witem.extra .wi-label{color:var(--blu)}
.wi-issue{font-size:10px;color:var(--mu);line-height:1.3;margin-top:3px;word-break:break-word}

/* ══════════════════════════════════════
   READING PROGRESS (sticky bottom)
══════════════════════════════════════ */
.rpbar-wrap{
  position:sticky;bottom:0;
  background:var(--surf);border-top:1px solid var(--bd);
  padding:10px 24px;display:flex;align-items:center;gap:12px;z-index:600;
  margin:0 -28px;  /* extend to edges */
}
.rpbar{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.rpfill{height:100%;background:linear-gradient(90deg,var(--g1),var(--gold));border-radius:2px;transition:width .3s}
.rplbl{font-size:11px;color:var(--mu);white-space:nowrap}

/* ══════════════════════════════════════
   LISTEN TAB
══════════════════════════════════════ */
.pcrd{
  background:linear-gradient(135deg,#0b2016,#1a3828);
  border-radius:16px;padding:22px 24px;margin-bottom:16px;
}
.pc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pc-ar{
  font-family:'Amiri Quran','Amiri',serif;font-size:var(--ar);
  direction:rtl;text-align:right;line-height:2.6;color:white;
  transition:font-size .2s;
}
.pc-tr{font-size:12px;color:rgba(255,255,255,.6);line-height:1.8;padding-top:10px;border-top:1px solid rgba(255,255,255,.1);margin-top:8px}
.seek{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;outline:none;margin:14px 0 4px}
.seek::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold)}
.seek::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--gold);border:none}
.atimes{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.4);margin-bottom:12px}
.spds{display:flex;gap:4px;flex-wrap:wrap}
.spd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65);padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.spd:hover{background:rgba(255,255,255,.18)}
.spd.on{background:var(--gold);color:#071008;border-color:var(--gold)}
.ctrls{display:flex;gap:8px;align-items:center;margin:14px 0 12px}
.pbtn{flex:1;padding:12px;background:var(--g1);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.pbtn:hover{background:var(--g2)}
.pbtn.pau{background:var(--amb)}
.auto-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--g3);border:1px solid var(--bd);border-radius:8px;margin-bottom:16px}
[data-theme="dark"] .auto-row{background:var(--surf2);border-color:var(--bd)}
.auto-row label{font-size:12px;color:var(--mu);cursor:pointer}
.mli{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surf);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .13s}
.mli:hover{border-color:var(--bd2);background:var(--g3)}
.mli.cur{border-color:var(--g1);background:var(--g3)}
[data-theme="dark"] .mli:hover,[data-theme="dark"] .mli.cur{background:var(--surf2)}
.mn{width:24px;height:24px;border-radius:50%;background:var(--g3);color:var(--g1);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mli.cur .mn{background:var(--gold);color:#071008}
.mar{font-family:'Amiri',serif;font-size:14px;direction:rtl;text-align:right;flex:1;color:var(--tx);line-height:1.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ══════════════════════════════════════
   CHECK TAB
══════════════════════════════════════ */
.ocard{background:var(--surf);border:1px solid var(--bd);border-radius:14px;padding:16px 20px;margin-bottom:14px;direction:rtl;text-align:right}
.oar{font-family:'Amiri Quran','Amiri',serif;font-size:var(--ar);line-height:2.6;color:var(--tx);transition:font-size .2s}
.otr{font-size:12px;color:var(--mu);line-height:1.8;margin-top:8px;padding-top:8px;border-top:1px solid var(--g3);direction:ltr;text-align:left}
.rbtn{width:100%;padding:16px;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Nunito',sans-serif;transition:all .2s;-webkit-appearance:none}
.r-idle{background:var(--g1);color:white}.r-idle:hover{background:var(--g2)}
.r-on{background:var(--red);color:white;animation:prec 1.4s infinite}
@keyframes prec{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.4)}60%{box-shadow:0 0 0 14px rgba(192,57,43,0)}}
.rdot{width:10px;height:10px;border-radius:50%;background:white;animation:blink 1s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.tbox{background:var(--g3);border:1px solid var(--bd2);border-radius:12px;padding:14px 18px;margin:12px 0}
[data-theme="dark"] .tbox{background:var(--surf2);border-color:var(--bd)}
.tar{font-family:'Amiri',serif;font-size:var(--ar);direction:rtl;text-align:right;color:var(--tx);line-height:2.0}
.sring{width:68px;height:68px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:3px solid rgba(255,255,255,.25)}
/* 4-level accordion */
.lvbox{background:var(--surf);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;overflow:hidden}
.lvhdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s;user-select:none}
.lvhdr:hover{background:var(--surf2)}
.lvico{font-size:18px;flex-shrink:0}
.lvtitle{font-size:13px;font-weight:600;color:var(--tx);flex:1}

.lvchev{font-size:11px;color:var(--mu);transition:transform .2s}
.lvhdr.open .lvchev{transform:rotate(180deg)}
.lvbody{display:none;padding:0 16px 12px;border-top:1px solid var(--bd)}
.lvbody.show{display:block}
.lvi{padding:8px 0;border-bottom:1px solid var(--g3);font-size:12px;line-height:1.6}
.lvi:last-child{border-bottom:none}
.lv-fix{font-size:11px;color:var(--g1);margin-top:2px;font-weight:600}
.cpwrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.cp{font-family:'Amiri',serif;font-size:15px;direction:rtl;padding:3px 10px;border-radius:6px;background:var(--g3);color:var(--g1);font-weight:700}

══════════════════════════════════════ */
.t1{color:#e67e22!important;border-bottom:2px dotted #e67e22}
.t2{color:#9b59b6!important;border-bottom:2px solid #9b59b6}
.t3{color:#2980b9!important}
.t4{color:#27ae60!important;border-bottom:2px solid #27ae60}
.t5{color:#117a65!important}
.t6{color:#e74c3c!important;border-bottom:2px dashed #e74c3c}
.t7{color:#d4ac0d!important}
.t8{color:#1abc9c!important}
.t9{color:#2471a3!important;font-weight:700}
.t10{color:#8e44ad!important}
.t11{color:#e6b800!important}
.t12{color:#5dade2!important}
.t13{color:#e91e8c!important}
[data-theme="dark"] .t11{color:#f8d840!important}
[data-theme="dark"] .t2{color:#d070f0!important;border-bottom-color:#d070f0}

.tjleg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:18px}
.tjli{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--surf);border:1px solid var(--bd);border-radius:8px;font-size:11px}
.tjsw{width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:1px}
.tjln{font-weight:700;color:var(--tx)}
.tjld{color:var(--mu);font-size:10px;margin-top:1px;line-height:1.3}

/* ══════════════════════════════════════

══════════════════════════════════════ */
.card{background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g1);margin-bottom:8px}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.srow select{font-size:12px;padding:6px 9px;border:1px solid var(--bd);border-radius:7px;background:var(--surf);color:var(--tx);cursor:pointer;font-family:'Nunito',sans-serif;max-width:170px}
.srow select:focus{outline:none;border-color:var(--g1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Nunito',sans-serif;transition:all .15s;-webkit-appearance:none;touch-action:manipulation}
.btn:disabled{opacity:.4;cursor:not-allowed!important}
.bp{background:var(--g1);color:white}.bp:hover:not(:disabled){background:var(--g2)}
.bo{background:transparent;border:1px solid var(--g1);color:var(--g1)}.bo:hover:not(:disabled){background:var(--g3)}
.bg{background:transparent;border:1px solid var(--bd);color:var(--mu)}.bg:hover:not(:disabled){border-color:var(--g1);color:var(--g1)}
.bgo{background:var(--gold);color:#071008}.bgo:hover:not(:disabled){background:var(--gold2)}
.bsm{padding:6px 11px;font-size:11px}
.blg{padding:13px 24px;font-size:13px}
.bfw{width:100%}
/* Loading */
.lbox{text-align:center;padding:80px 20px;min-height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.spin{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--g1);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.lbox p{font-size:13px;color:var(--mu)}
.ebox{padding:32px 20px;background:var(--redl);border:1px solid var(--bd);border-radius:14px;margin:20px 0;text-align:center}
.ebox p{font-size:13px;color:var(--red);margin-bottom:8px}
.ebox small{font-size:11px;color:var(--mu);display:block;margin-bottom:12px}

/* ══════════════════════════════════════
   BOTTOM NAV (mobile only)
══════════════════════════════════════ */
#botNav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:60px;background:var(--surf);border-top:1px solid var(--bd);
  grid-template-columns:repeat(4,1fr);z-index:1000;
}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;padding:8px;transition:all .15s}
.bn:disabled{opacity:.35;cursor:not-allowed}
.bn .bi{font-size:20px;line-height:1}
.bn .bl{font-size:10px;font-weight:600;color:var(--mu)}
.bn.on .bl{color:var(--g1)}

/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:850;backdrop-filter:blur(2px)}
#overlay.show{display:block}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--sb);color:var(--sbt);padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity .3s}

/* ══════════════════════════════════════
   RESPONSIVE — TABLET
══════════════════════════════════════ */
@media(max-width:1023px){
  :root{--sw:220px}
  .logo small{display:none}
  #curInfo{max-width:110px}
  #content{padding:20px 20px 100px}
}
/* ══════════════════════════════════════
   RESPONSIVE — MOBILE (< 640px)
══════════════════════════════════════ */
@media(max-width:639px){
  :root{--th:50px}
  #menuBtn{display:flex}
  #curInfo{display:none!important}

  /* Sidebar becomes slide drawer */
  #sidebar{
    transform:translateX(-105%);
    width:82%;max-width:300px;
    box-shadow:4px 0 28px rgba(0,0,0,.5);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  #sidebar.open{transform:translateX(0)}
  #closeBtn{display:flex}

  /* Main: no margin (sidebar out of flow on mobile) */
  #main{margin-left:0}

  /* Bottom nav */
  #botNav{display:grid}

  /* Tab bar hidden on mobile, bottom nav used */
  #tabs{display:none}

  /* Compact content */
  #content{padding:14px 16px 80px}

  /* Adjust tabs sticky position */
  #shdr{top:var(--th)}
  #tabs{top:calc(var(--th) + 50px)}

  /* Card adjustments */
  .ah-ar{padding:12px 16px 8px}
  .ah-top{padding:10px 16px 0}
  .ah-tr{padding:0 16px 14px}
  .bismillah{font-size:calc(var(--ar) + 2px);padding:14px 16px}

  /* Listen */
  .pcrd{padding:16px}
  .pc-ar{font-size:calc(var(--ar) - 2px)}

  /* Hide some controls */
  .hide-mob{display:none!important}
  #fSlider{width:60px}
  #langSel{max-width:90px;font-size:10px}
}
@media(max-width:380px){
  .w-grid{grid-template-columns:1fr}
  .tjleg{grid-template-columns:1fr 1fr}
}

async function loadSurah(n){
  const s=SURAHS.find(x=>x.n===n);
  if(!s) return;

  // Stop audio/recording
  stopAudio(); killRec();

  // Reset state
  S={...S,surah:s,arAyahs:[],trAyahs:[],romanAyahs:[],idx:0,playing:false,
     transcript:'',feedback:null,recording:false,audDur:0,audPos:0};

  // Update sidebar
  renderList(SURAHS);

  // ✅ Show surah view, hide welcome
  g('welcome').style.display='none';
  g('sview').style.display='block';

  // Update header
  g('shName').textContent=s.e;
  g('shMeta').textContent=`Surah ${s.n}  ·  ${s.v} Ayahs  ·  ${s.t}`;
  g('shAr').textContent=s.a;
  g('curInfo').style.display='block';
  g('curInfo').textContent=`${s.e} (${s.n}/114)`;
  document.title=`${s.e} — Al-Qurʾān`;

  // Enable bottom nav
  ['bnR','bnL','bnC'].forEach(id=>{const el=g(id);if(el)el.disabled=false;});
  syncTabs(); syncBotNav();

  // Scroll to top
  window.scrollTo({top:0,behavior:'smooth'});

  // Show loading inside content
  g('content').innerHTML=`<div class="lbox" aria-busy="true">
    <div class="spin"></div><p>Loading ${esc(s.e)}…</p>
  </div>`;

  // Fetch data
  try{
    // Fetch Arabic
    const arRes=await fetch(`https://api.alquran.cloud/v1/surah/${n}/ar.uthmani`);
    if(!arRes.ok) throw new Error(`HTTP ${arRes.status}`);
    const arJson=await arRes.json();
    if(!arJson||arJson.code!==200) throw new Error(arJson&&arJson.status||'API error');
    S.arAyahs=arJson.data&&arJson.data.ayahs||[];
    if(S.arAyahs.length===0) throw new Error('No ayahs returned');

    // Fetch translation (non-blocking)
    S.trAyahs=[];
    if(S.lang){
      try{
        const trRes=await fetch(`https://api.alquran.cloud/v1/surah/${n}/${S.lang}`);
        if(trRes.ok){
          const trJson=await trRes.json();
          if(trJson&&trJson.code===200) S.trAyahs=trJson.data&&trJson.data.ayahs||[];
        }
      }catch(te){ console.warn('Translation fetch failed:',te); }
    }

    // Fetch romanization (non-blocking, always)
    try{ await fetchRoman(n); }catch(re){ console.warn('Roman fetch:',re); }

    // Render
    draw();

  }catch(err){
    console.error('loadSurah error:',err);
    g('content').innerHTML=`<div class="ebox" role="alert">
      <p>⚠️ Could not load ${esc(s.e)}</p>
      <small>Error: ${esc(String(err.message))}</small>
      <small>Please check your internet connection.</small>
      <button class="btn bp" onclick="loadSurah(${n})">↺ Retry</button>
    </div>`;
  }
}

async function changeLang(){
  S.lang=g('langSel').value; S.trAyahs=[];
  if(!S.surah||!S.arAyahs.length) return;
  if(S.lang){
    try{
      const r=await fetch(`https://api.alquran.cloud/v1/surah/${S.surah.n}/${S.lang}`);
      if(r.ok){const j=await r.json();if(j&&j.code===200)S.trAyahs=j.data&&j.data.ayahs||[];}
    }catch(e){console.warn(e);}
  }
  draw();
}

async function fetchRoman(n){
  try{
    const r=await fetch(`https://api.alquran.cloud/v1/surah/${n}/en.transliteration`);
    if(r.ok){const j=await r.json();if(j&&j.code===200)S.romanAyahs=j.data&&j.data.ayahs||[];}
  }catch(e){console.warn('Roman fetch error:',e);}
}

function tr(i){return(S.trAyahs[i]&&S.trAyahs[i].text)||'';}
function rom(i){return(S.romanAyahs[i]&&S.romanAyahs[i].text)||'';}
function trCls(){const l=S.lang;if(!l)return'';if(l.startsWith('ur.')||l.startsWith('fa.'))return' ah-tr-rtl';return'';}
function lc(){return S.lang?S.lang.split('.')[0]:'';}
function showRom(i){const r=rom(i);return S.romanOn&&r?`<div class="ah-rom">${esc(r)}</div>`:'';}
function showOrRom(i){const r=rom(i);return S.romanOn&&r?`<div class="or-rom">${esc(r)}</div>`:'';}
function showPcRom(i){const r=rom(i);return S.romanOn&&r?`<div class="pc-rom">${esc(r)}</div>`:''}
// Tajweed word analysis
const SUN=new Set([...'تثدذرزسشصضطظلن']);
const QALQ=new Set([...'قطبجد']);
const SKN='\u0652',SHD='\u0651',FTH='\u064E',DMM='\u064F',KSR='\u0650';
const ALEF='\u0627',WAW='\u0648',YA='\u064A',NUN='\u0646',MEEM='\u0645';

function tjCls(word){
  const ch=[...word];
  if(word.startsWith('\u0627\u0644')||word.startsWith('\u0622\u0644')){
    for(let i=2;i<ch.length;i++){const c=ch[i];if(/[\u0600-\u064A]/.test(c))return SUN.has(c)?'t11':'t12';}
  }
  for(let i=0;i<ch.length;i++){
    const c=ch[i],nx=ch[i+1]||'',pv=ch[i-1]||'';
    if(QALQ.has(c)&&(nx===SKN||i>=ch.length-2))return 't1';
    if((c===NUN||c===MEEM)&&nx===SHD)return 't2';
    if(c===MEEM&&nx===SKN)return 't13';
    if(c===ALEF&&pv===FTH)return 't8';
    if(c===WAW&&pv===DMM)return 't8';
    if(c===YA&&pv===KSR)return 't8';
  }
  return'';
}

function wrapWords(text,tajweed=false){
  return text.split(/(\s+)/).map(w=>{
    if(/^\s+$/.test(w))return w;
    const cls=tajweed?tjCls(w):'';
    const title=tajweed&&cls?TJ.find(r=>r.cls===cls)?.n||'':'';
    return`<span class="aw${cls?' '+cls:''}"${title?` title="${title}"`:''}>${esc(w)}</span>`;
  }).join('');
}

function drawRead(){
  const {arAyahs,idx,surah,tajOn}=S;
  const hasTr=S.trAyahs.length>0;
  const tc=trCls();
  let html='';

  // Bismillah for surahs other than 1 and 9
  if(surah.n!==9&&surah.n!==1){
    html+=`<div class="bismillah" lang="ar" dir="rtl" role="text" aria-label="Bismillah" tabindex="0">
      بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ
    </div>`;
  }

  arAyahs.forEach((a,i)=>{
    const t=hasTr?tr(i):'';
    const arHtml=wrapWords(a.text,tajOn);
    html+=`<div class="ah${i===idx?' cur':''}" id="ah${i}">
      <div class="ah-top">
        <div class="ah-badge">${a.numberInSurah}</div>
        <span class="ah-label">${surah.e} ${a.numberInSurah}</span>
        <div class="ah-btns">
          <button class="ah-btn" onclick="doPlay(${i})" title="Play this ayah">▶</button>
          <button class="ah-btn" onclick="doCopy('${esc(a.text).replace(/'/g,"\\'")}',event)" title="Copy Arabic">📋</button>
          <button class="ah-btn" onclick="doPractice(${i})" title="Practice this ayah">🎙️</button>
        </div>
      </div>
      <div class="ah-ar" lang="ar" dir="rtl">${arHtml}<span class="ah-marker">۝${a.numberInSurah}</span></div>
      ${showRom(i)}
      ${t?`<div class="ah-tr${tc}" lang="${lc()}">${esc(t)}</div>`:''}
    </div>`;
  });

  // Progress bar at bottom
  const pct=Math.round((idx+1)/arAyahs.length*100);
  html+=`<div class="rpbar-wrap">
    <span class="rplbl">Ayah ${idx+1} / ${arAyahs.length}</span>
    <div class="rpbar"><div class="rpfill" id="rpf" style="width:${pct}%"></div></div>
    <span class="rplbl" style="font-weight:700;color:var(--g1)">${pct}%</span>
  </div>`;

  g('content').innerHTML=html;
  setupObserver();
  // Scroll to current ayah with offset for sticky headers
  setTimeout(()=>{const el=g(`ah${idx}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);
}

function setupObserver(){
  if(window._obs) window._obs.disconnect();
  const cards=document.querySelectorAll('.ah');
  if(!cards.length)return;
  window._obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const i=parseInt(e.target.id.replace('ah',''));
        if(!isNaN(i)&&i!==S.idx){
          S.idx=i;
          const pct=Math.round((i+1)/S.arAyahs.length*100);
          const rf=g('rpf');if(rf)rf.style.width=pct+'%';
        }
      }
    });
  },{threshold:0.5,rootMargin:'-100px 0px 0px 0px'});
  cards.forEach(c=>window._obs.observe(c));
}

function doCopy(text,e){e.stopPropagation();navigator.clipboard.writeText(text).then(()=>toast('Ayah copied!')).catch(()=>toast('Copy failed'));}

function ljump(i){S.idx=i;stopAudio();S.audPos=0;drawListen();}
function prevA(){if(S.idx>0){S.idx--;stopAudio();S.audPos=0;drawListen();}}
function nextA(){if(S.idx<S.arAyahs.length-1){S.idx++;stopAudio();S.audPos=0;drawListen();}}
function setSpd(sp){S.speed=sp;const a=g('aud');if(a)a.playbackRate=sp;if(S.tab==='listen')drawListen();}
function seekTo(v){const a=g('aud');if(a&&a.duration){a.currentTime=parseFloat(v);S.audPos=parseFloat(v);}}
function togglePlay(){if(S.playing){stopAudio();drawListen();}else{playAyah();}}

// ── Audio ──────────────────────────────────────
function playAyah(){
  const cur=S.arAyahs[S.idx]; if(!cur)return;
  const aud=g('aud');
  aud.playbackRate=S.speed;
  aud.src=`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${cur.number}.mp3`;
  aud.load();
  aud.play().catch(()=>{
    aud.src=`https://everyayah.com/data/Alafasy_128kbps/${p3(S.surah.n)}${p3(cur.numberInSurah)}.mp3`;
    aud.load(); aud.play().catch(e=>console.warn('Audio failed:',e));
  });
  S.playing=true; S.audDur=0; S.audPos=0;
  if(S.tab==='listen') drawListen();
  hookAud();
}
function stopAudio(){const a=g('aud');if(a)a.pause();unhookAud();S.playing=false;}
function hookAud(){
  const a=g('aud');
  a.onloadedmetadata=()=>{S.audDur=a.duration;updSeek();};
  a.ontimeupdate=()=>{S.audPos=a.currentTime;updSeek();hlWord(a.currentTime,a.duration);};
}
function unhookAud(){const a=g('aud');if(a){a.onloadedmetadata=null;a.ontimeupdate=null;}}
function updSeek(){
  const sb=g('seekBar');
  if(sb){sb.max=Math.ceil(S.audDur)||100;sb.value=Math.ceil(S.audPos)||0;}
  const te=g('tEl'),td=g('tDur');
  if(te)te.textContent=fmt(S.audPos);
  if(td)td.textContent=S.audDur?fmt(S.audDur):'--:--';
}
function hlWord(cur,dur){
  if(!dur||!cur)return;
  const a=S.arAyahs[S.idx]; if(!a)return;
  const wds=a.text.split(/\s+/).filter(Boolean);
  const wi=Math.min(Math.floor((cur/dur)*wds.length),wds.length-1);
  document.querySelectorAll('#pcAr .aw.lit').forEach(el=>el.classList.remove('lit'));
  const spans=document.querySelectorAll('#pcAr .aw');
  if(spans[wi])spans[wi].classList.add('lit');
}
g('aud').addEventListener('ended',()=>{
  S.playing=false; unhookAud();
  if(S.autoPlay&&S.idx<S.arAyahs.length-1){S.idx++;setTimeout(playAyah,500);}
  else if(S.tab==='listen')drawListen();
});

// ════════════════════════════════════════════════
//  CHECK TAB
// ════════════════════════════════════════════════
function drawCheck(){
  const {arAyahs,idx,surah,recording,transcript,feedback,analyzing}=S;
  if(!arAyahs.length)return;
  const cur=arAyahs[idx];
  const t=tr(idx);
  const tc=trCls();
  const sc=feedback?.score;
  let scC='var(--g1)',scB='var(--g3)';
  if(sc!==undefined){if(sc<60){scC='var(--red)';scB='var(--redl)';}else if(sc<80){scC='var(--amb)';scB='var(--ambl)';}}

  let html=`
  <div class="srow">
    <label style="font-size:12px;color:var(--mu)">Ayah:</label>
    <select onchange="cjump(parseInt(this.value))">
      ${arAyahs.map((a,i)=>`<option value="${i}"${i===idx?' selected':''}>Ayah ${a.numberInSurah}</option>`).join('')}
    </select>
    <button class="btn bo bsm" onclick="playChk()">🎧 Listen first</button>
    <button class="btn bg bsm" onclick="prevC()" ${idx===0?'disabled':''}>←</button>
    <button class="btn bg bsm" onclick="nextC()" ${idx===arAyahs.length-1?'disabled':''}>→</button>
  </div>

  <div class="ocard">
    <div class="sec" style="direction:ltr;text-align:left;margin-bottom:8px">📖 Original — ${esc(surah.e)}, Ayah ${cur.numberInSurah}</div>
    <div class="oar" lang="ar">${esc(cur.text)} <span style="font-size:13px;opacity:.3">۝${cur.numberInSurah}</span></div>
    ${showOrRom(idx)}
    ${t?`<div class="otr" lang="${lc()}">${esc(t)}</div>`:''}
  </div>

  <button class="rbtn ${recording?'r-on':'r-idle'}"
    onclick="${recording?'stopRec()':'startRec()'}" aria-pressed="${recording}">
    ${recording?`<span class="rdot"></span> Stop Recording`:'🎙️ Start Recording'}
  </button>
  <p style="font-size:11px;color:var(--mu);text-align:center;margin:8px 0 16px" aria-live="polite">
    ${recording
      ?'<span style="color:var(--red);font-weight:600">🔴 Listening… speak clearly in Arabic</span>'
      :'Tap Listen first → then Record → speak the ayah in Arabic · Chrome / Edge recommended'}
  </p>`;

  if(transcript){
    html+=`<div class="tbox">
      <div class="sec" style="margin-bottom:6px">Your Recitation (Detected)</div>
      <div class="tar" lang="ar" dir="rtl">${esc(transcript)}</div>
    </div>`;
    if(!feedback){
      html+=`<div style="text-align:center;margin-bottom:16px">
        <button class="btn bgo blg bfw" onclick="analyze()" ${analyzing?'disabled':''}>
          ${analyzing?'🤖 Analyzing…':'🤖 Analyze My Pronunciation (AI)'}
        </button>
      </div>`;
    }
  }

  if(feedback&&!feedback.error){
    html+=`<div style="background:${scB};border:1px solid ${scC};border-radius:14px;padding:16px;display:flex;align-items:flex-start;gap:14px;margin-bottom:14px">
      <div class="sring" style="background:${scC}">
        <span style="font-size:20px;font-weight:700;color:white;line-height:1">${sc}</span>
        <span style="font-size:9px;color:rgba(255,255,255,.65)">/100</span>
      </div>
      <div>
        <p style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px">${esc(feedback.overall||'')}</p>
        <p style="font-size:12px;color:var(--mu);font-style:italic">${esc(feedback.encouragement||'')}</p>
        ${feedback.improvement?`<p style="font-size:12px;color:var(--g1);margin-top:6px;font-weight:600">💡 ${esc(feedback.improvement)}</p>`:''}
      </div>
    </div>`;

    // Word-by-word comparison grid
    if(feedback.wordAnalysis&&feedback.wordAnalysis.length){
      const statusMap={correct:{badge:'✅',cls:'ok',label:'Correct'},error:{badge:'❌',cls:'err',label:'Error'},missing:{badge:'⚠️',cls:'miss',label:'Missing'},extra:{badge:'➕',cls:'extra',label:'Extra'}};
      html+=`<div class="wcomp">
        <div class="sec">📊 Word-by-Word Analysis</div>
        <div style="display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;font-size:11px">
          <span style="color:var(--g1)">✅ Correct: ${feedback.wordAnalysis.filter(w=>w.status==='correct').length}</span>
          <span style="color:var(--red)">❌ Errors: ${feedback.wordAnalysis.filter(w=>w.status==='error').length}</span>
          <span style="color:var(--amb)">⚠️ Missing: ${feedback.wordAnalysis.filter(w=>w.status==='missing').length}</span>
          ${feedback.wordAnalysis.filter(w=>w.status==='extra').length?`<span style="color:var(--blu)">➕ Extra: ${feedback.wordAnalysis.filter(w=>w.status==='extra').length}</span>`:''}
        </div>
        <div class="wgrid">
          ${feedback.wordAnalysis.map(w=>{
            const st=statusMap[w.status]||statusMap.error;
            return`<div class="witem ${st.cls}" title="${esc(w.issue||'Correct')}">
              <div class="wi-ar">${esc(w.word||'—')}</div>
              <span class="wi-badge">${st.badge}</span>
              <div class="wi-label">${st.label}</div>
              ${w.studentSaid&&w.studentSaid!==w.word?`<div class="wi-issue">Said: ${esc(w.studentSaid)}</div>`:''}
              ${w.issue?`<div class="wi-issue">${esc(w.issue.slice(0,60))}</div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }

    [
      {k:'level1',ico:'👄',lab:'Level 1 — Letter Pronunciation (Makharij)'},
      {k:'level2',ico:'🎵',lab:'Level 2 — Harakāt & Vowels'},
      {k:'level3',ico:'📏',lab:'Level 3 — Madd & Timing'},
      {k:'level4',ico:'📚',lab:'Level 4 — Tajwīd Rules'},
    ].forEach((lv,li)=>{
      const d=feedback[lv.k]||{};
      const ls=d.score||0;
      let lc='#27ae60';if(ls<60)lc='#c0392b';else if(ls<80)lc='#d68910';
      html+=`<div class="lvbox">
        <div class="lvhdr" id="lvh${li}" onclick="togLv(${li})" tabindex="0"
          onkeydown="if(event.key==='Enter')togLv(${li})" aria-expanded="false">
          <span class="lvico">${lv.ico}</span>
          <span class="lvtitle">${esc(lv.lab)}</span>
          <div class="lvscore" style="background:${lc}">${ls}</div>
          <span class="lvchev">▾</span>
        </div>
        <div class="lvbody" id="lvb${li}">
          ${d.summary?`<p style="font-size:12px;color:var(--mu);margin:8px 0 6px">${esc(d.summary)}</p>`:''}
          ${(d.items||[]).map(it=>`<div class="lvi">
            ${it.word?`<div style="font-family:'Amiri',serif;font-size:17px;margin-bottom:3px" lang="ar" dir="rtl">${esc(it.word)}</div>`:''}
            <strong style="color:var(--tx)">${esc(it.issue||'')}</strong>
            <div class="lv-fix">✓ Fix: ${esc(it.fix||it.correction||'')}</div>
          </div>`).join('')}
          ${!(d.items||[]).length?`<p style="font-size:12px;color:var(--g1);padding:6px 0">✅ No issues in this category</p>`:''}
        </div>
      </div>`;
    });

    if(feedback.correct?.length){
      html+=`<div style="padding:12px 14px;background:var(--g3);border:1px solid var(--bd2);border-radius:12px;margin-bottom:12px">
        <div class="sec">✅ Well Pronounced</div>
        <div class="cpwrap">${feedback.correct.map(w=>`<span class="cp" lang="ar">${esc(w)}</span>`).join('')}</div>
      </div>`;
    }
    html+=`<div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn bo bfw" onclick="resetChk()">🔄 Try Again</button>
      <button class="btn bg bsm" onclick="setTab('tajweed')">🌈 Tajwīd View</button>
    </div>`;
  }
  if(feedback?.error){
    html+=`<div class="ebox" role="alert">
      <p>⚠️ AI Analysis failed.</p>
      <small>${feedback.msg?esc(feedback.msg):'Check your internet connection and try again.'}</small>
      <button class="btn bp" onclick="analyze()">↺ Retry Analysis</button>
    </div>`;
  }
  g('content').innerHTML=html;
}

function togLv(i){
  const h=g(`lvh${i}`),b=g(`lvb${i}`); if(!h||!b)return;
  const open=b.classList.contains('show');
  b.classList.toggle('show',!open);
  h.classList.toggle('open',!open);
  h.setAttribute('aria-expanded',!open);
}
function prevC(){if(S.idx>0){S.idx--;S.transcript='';S.feedback=null;drawCheck();}}
function nextC(){if(S.idx<S.arAyahs.length-1){S.idx++;S.transcript='';S.feedback=null;drawCheck();}}
function cjump(i){S.idx=i;S.transcript='';S.feedback=null;drawCheck();}
function resetChk(){S.transcript='';S.feedback=null;drawCheck();}
function playChk(){
  const cur=S.arAyahs[S.idx]; if(!cur)return;
  const a=g('aud');
  a.playbackRate=1;
  a.src=`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${cur.number}.mp3`;
  a.load();a.play().catch(()=>{
    a.src=`https://everyayah.com/data/Alafasy_128kbps/${p3(S.surah.n)}${p3(cur.numberInSurah)}.mp3`;
    a.load();a.play().catch(()=>{});
  });
}

// ── Recording ───────────────────────────────────
function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Speech recognition requires Google Chrome or Microsoft Edge.\nPlease open this file in Chrome for best results.');return;}
  const r=new SR();
  r.lang='ar-SA';r.continuous=false;r.interimResults=false;r.maxAlternatives=1;
  r.onresult=e=>{S.transcript=e.results[0][0].transcript;S.recording=false;S.feedback=null;drawCheck();};
  r.onerror=e=>{console.warn('SpeechRec:',e.error);S.recording=false;drawCheck();};
  r.onend=()=>{S.recording=false;};
  S.recog=r;r.start();
  S.recording=true;S.transcript='';S.feedback=null;drawCheck();
}
function stopRec(){try{if(S.recog)S.recog.stop();}catch(e){}S.recording=false;drawCheck();}
function killRec(){try{if(S.recog)S.recog.stop();}catch(e){}S.recog=null;S.recording=false;}

// ── AI Analysis — comprehensive & precise ─────────
async function analyze(){
  const{transcript,arAyahs,idx,surah}=S;
  if(!transcript||!arAyahs[idx])return;
  S.analyzing=true;S.feedback=null;drawCheck();
  const cur=arAyahs[idx];
  const translation=tr(idx);
  const romanization=rom(idx);

  // Build detailed word list for comparison context
  const origWords=cur.text.split(/\s+/).filter(Boolean);
  const studentWords=transcript.split(/\s+/).filter(Boolean);

  const prompt=`You are a world-class Qurʾān Tajwīd expert and Arabic phonetics specialist with 30+ years of teaching experience. Perform an EXTREMELY PRECISE analysis of this student's recitation, detecting EVERY error no matter how small.

══ ORIGINAL AYAH ══
Surah: ${surah.e} (No. ${surah.n}), Ayah: ${cur.numberInSurah}
Arabic (full diacritics): ${cur.text}
${romanization?`Romanization: ${romanization}`:''}
${translation?`Meaning: ${translation}`:''}
Original word count: ${origWords.length} words

══ STUDENT'S RECITATION ══
Detected text: ${transcript}
Student word count: ${studentWords.length} words

══ ANALYSIS REQUIREMENTS ══
1. Compare EVERY WORD between the original and student recitation
2. Detect ALL errors including the subtlest ones:
   • Wrong letter (ص/س, ح/ه, ط/ت, ع/ء, ق/ك etc.)
   • Wrong harakah/vowel (fathah/dammah/kasrah confusion)
   • Missing or wrong sukūn (ْ)
   • Missing or wrong shaddah/tashdeed (ّ)
   • Wrong tanwīn (تنوين)
   • Madd errors: natural=2 counts, wājib=4-5 counts, jāʾiz=2/4/6 counts
   • Missing Ghunnah (2 counts nasalization for ن/م with shaddah)
   • Ikhfāʾ not applied (ن/tanwīn before 15 letters)
   • Idghām error (ن/tanwīn before ي/ن/م/و/ل/ر)
   • Iqlāb missing (ن/tanwīn before ب → meem sound)
   • Iẓhār not clear (ن/tanwīn before throat letters: ء/ه/ع/ح/غ/خ)
   • Qalqalah echo missing (ق/ط/ب/ج/د with sukūn)
   • Lām Shamsiyyah/Qamariyyah error
   • Mīm Sākinah rules not applied
   • Missing words, extra words, or word order errors
   • Hamzah (ء/أ) vs soft Alef errors
   • Heavy vs light letters (مفخم vs مرقق)
3. Score STRICTLY: 100 = perfect, deduct for every single error
4. For each error: identify the EXACT word, EXACTLY what was wrong, and the EXACT correction technique with mouth/tongue position if relevant

Return ONLY a JSON object. NO markdown. NO extra text. NO code fences. Start directly with {:
{
  "score": <strict 0-100 integer>,
  "overall": "<2-3 sentence precise assessment mentioning specific strengths and weaknesses>",
  "wordAnalysis": [
    {
      "word": "<exact Arabic word from original>",
      "status": "correct|error|missing|extra",
      "studentSaid": "<what student said, or null if missing>",
      "issue": "<if error: exact mistake description>",
      "fix": "<if error: specific correction technique>"
    }
  ],
  "level1": {
    "score": <0-100>,
    "summary": "<Makharij al-Ḥurūf assessment — which letters were clear vs unclear>",
    "items": [
      {"word":"<Arabic word>","issue":"<exact letter and how it was mispronounced>","fix":"<tongue/lip/throat position for correction>"}
    ]
  },
  "level2": {
    "score": <0-100>,
    "summary": "<Harakāt & tashkeel assessment — vowel accuracy>",
    "items": [
      {"word":"<Arabic word>","issue":"<which vowel was wrong and how, e.g. fathah read as dammah>","fix":"<exact correction>"}
    ]
  },
  "level3": {
    "score": <0-100>,
    "summary": "<Madd, sukūn & timing assessment — elongation and pause accuracy>",
    "items": [
      {"word":"<Arabic word>","issue":"<madd type and actual vs required length, e.g. madd wājib should be 4-5 counts but only 2 given>","fix":"<correction with exact count>"}
    ]
  },
  "level4": {
    "score": <0-100>,
    "summary": "<Tajwīd rules assessment — which rules were applied vs missed>",
    "items": [
      {"word":"<Arabic word>","issue":"<rule name + exact violation, e.g. Ikhfāʾ for ن before ت not applied>","fix":"<how to correctly apply this rule>"}
    ]
  },
  "correct": ["<Arabic words recited correctly — only include genuinely correct words>"],
  "improvement": "<one specific, actionable practice tip for this student>",
  "encouragement": "<warm, specific encouragement acknowledging their effort>"
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:2400,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const d=await res.json();
    let raw=(d.content?.[0]?.text||'').trim();
    // Strip any markdown code fences
    raw=raw.replace(/^```(?:json)?[\r\n]*/,'').replace(/[\r\n]*```$/,'').trim();
    // Find first { in case of any prefix text
    const firstBrace=raw.indexOf('{');
    if(firstBrace>0)raw=raw.slice(firstBrace);
    S.feedback=JSON.parse(raw);
  }catch(e){
    console.error('AI analysis error:',e);
    S.feedback={error:true,msg:e.message};
  }
  S.analyzing=false;drawCheck();
}

// ════════════════════════════════════════════════
//  TAJWEED TAB
// ════════════════════════════════════════════════
function drawTajweed(){
  const{arAyahs,surah}=S;
  const hasTr=S.trAyahs.length>0;
  const tc=trCls();
  const legend=`<div class="tjleg">${TJ.map(r=>`<div class="tjli" tabindex="0" aria-label="${r.n}: ${r.d}">
    <div class="tjsw" style="background:${r.c}"></div>
    <div><div class="tjln">${r.n}</div><div class="tjld">${r.d}</div></div>
  </div>`).join('')}</div>`;
  let ayahs='';
  if(surah.n!==9&&surah.n!==1){
    ayahs+=`<div class="bismillah" lang="ar" dir="rtl" tabindex="0">${wrapWords('بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ',true)}</div>`;
  }
  arAyahs.forEach((a,i)=>{
    const t=hasTr?tr(i):'';
    ayahs+=`<div class="ah" id="taj${i}" tabindex="0">
      <div class="ah-top">
        <div class="ah-badge">${a.numberInSurah}</div>
        <span class="ah-label">${surah.e} ${a.numberInSurah}</span>
      </div>
      <div class="ah-ar" lang="ar" dir="rtl">${wrapWords(a.text,true)}<span class="ah-marker">۝${a.numberInSurah}</span></div>
      ${showRom(i)}
      ${t?`<div class="ah-tr${tc}" lang="${lc()}">${esc(t)}</div>`:''}
    </div>`;
  });
  g('content').innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <h2 style="font-size:14px;font-weight:700;color:var(--tx)">🌈 Tajwīd Color View — ${esc(surah.e)}</h2>
    <span style="font-size:11px;color:var(--mu)">Hover words for rule name</span>
  </div>
  ${legend}
  <div style="padding:9px 12px;background:var(--ambl);border:1px solid var(--bd);border-radius:8px;margin-bottom:18px">
    <p style="font-size:11px;color:var(--amb)">📌 Colors indicate primary detected Tajwīd pattern per word. Full mastery requires a qualified teacher.</p>
  </div>
  ${ayahs}`;
}

// ════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;
  if(!S.surah)return;
  if(e.key==='ArrowRight'&&S.tab==='listen'){e.preventDefault();nextA();}
  if(e.key==='ArrowLeft'&&S.tab==='listen'){e.preventDefault();prevA();}
  if(e.key===' '&&S.tab==='listen'){e.preventDefault();togglePlay();}
  if(e.key==='r'&&S.tab==='check'&&!S.recording)startRec();
  if(e.key==='s'&&S.tab==='check'&&S.recording)stopRec();
  if(e.key==='1')setTab('read');
  if(e.key==='2')setTab('listen');
  if(e.key==='3')setTab('check');
  if(e.key==='4')setTab('tajweed');
  if(e.key==='Escape')closeSB();
});

// Resize
window.addEventListener('resize',()=>{
  if(window.innerWidth>=640){
    closeSB();
    document.body.style.overflow='';
  }
});
</script>
